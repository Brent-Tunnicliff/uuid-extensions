name: Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  package_xcodebuild:
    strategy:
      # Don't cancel the other matrix values if one fails.
      fail-fast: false
      matrix:
        target: [
          { platform: "iOS", simulator_version: "26.2" },
          { platform: "tvOS", simulator_version: "26.2" },
          { platform: "watchOS", simulator_version: "26.2" },
          { platform: "visionOS", simulator_version: "26.2" },

          # macOS runs on the host and doesn't need a simulator.
          { platform: "macOS", simulator_version: "" }
        ]
    uses: Brent-Tunnicliff/workflow-common-apple/.github/workflows/xcodebuild.yml@v2
    with:
      platform: "${{ matrix.target.platform }}"
      runs_on: "macos-26"
      scheme: "swift-uuid"
      simulator_version: "${{ matrix.target.simulator_version }}"
      xcode_path: "/Applications/Xcode_26.3.app"

  # Macro tests can not be run on any simulator target, so easier to split into its own job.
  macros_xcodebuild:
    uses: Brent-Tunnicliff/workflow-common-apple/.github/workflows/xcodebuild.yml@v2
    with:
      platform: "macOS"
      runs_on: "macos-26"
      scheme: "SwiftUUIDMacros"
      simulator_version: ""
      xcode_path: "/Applications/Xcode_26.3.app"

  package_swift:
    strategy:
      # Don't cancel the other matrix values if one fails.
      fail-fast: false
      matrix:
        run_on: [
          "ubuntu-latest",
          "macos-latest",
          "windows-latest",
        ]
    uses: Brent-Tunnicliff/workflow-common-apple/.github/workflows/swift.yml@v2
    with:
      runs_on: "${{ matrix.run_on }}"

  lint:
    uses: Brent-Tunnicliff/workflow-common-apple/.github/workflows/lint.yml@v2
    with:
      runs_on: "macos-26"

