# This workflow is responsible for building and publishing the documentation.
# It is expected to run for changes to main branch after the Pipeline workflow succeeds.

name: Documentation

on:
  workflow_run:
    workflows: 
      - "Pipeline"
    types: 
      - completed
  workflow_dispatch:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  documentation:
    uses: Brent-Tunnicliff/workflow-common-apple/.github/workflows/documentation.yml@add_documentation_workflow
    with:
      fetch_depth: 0
      ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      target: "UUIDExtensions"
