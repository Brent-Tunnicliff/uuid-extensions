name: Publish Documentation to GitHub Pages

on:
  push:
    branches:
      - "documentation"
    # paths:
    #   - "**.swift"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Generate Documentation
        shell: bash
        run: swift package
          --allow-writing-to-directory ./.build/docs/
          generate-documentation
          --target UUIDExtensions
          --transform-for-static-hosting
          --hosting-base-path uuid-extensions
          --output-path ./.build/docs/
          --disable-indexing
          --warnings-as-errors

      - name: Add redirect index
        run: |
          cat > ./.build/docs/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./documentation/uuidextensions/">
            </head>
            <body>
              <p>Redirecting to documentation...</p>
            </body>
          </html>
          EOF

      - name: List docs files
        shell: bash
        run: ls -R ./.build/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './.build/docs/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Success
        shell: bash
        run: echo "Documentation deployed to ${{ steps.deployment.outputs.page_url }}"
